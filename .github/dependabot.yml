version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "Monday"
    groups:
      # Batch all dev-dependency updates together for a single review
      dev-dependencies:
        dependency-type: "development"
      # Batch production dependency patch/minor updates together
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "Monday"
    groups:
      github-actions:
        patterns:
          - "*"
